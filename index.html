  React.useEffect(() => {
    const onFocus = (e) => { setFocusId(e.detail); window.scrollTo({ top: 0 }); };
    window.addEventListener('focus-call', onFocus);
    return () => window.removeEventListener('focus-call', onFocus);
  }, []);

  const regioes = [
    { id:'Nacional', label:'Nacional' },
    { id:'Norte', label:'Norte' },
    { id:'Nordeste', label:'Nordeste' },
    { id:'Centro-Oeste', label:'Centro-Oeste' },
    { id:'Sudeste', label:'Sudeste' },
    { id:'Sul', label:'Sul' }
  ];

  const filtered = React.useMemo(() => {
    return CHAMADAS.filter(c => {
      if (q && !`${c.titulo} ${c.resumo} ${(c.tags||[]).join(' ')}`.toLowerCase().includes(q.toLowerCase())) return false;
      if (status.length && !status.includes(c.status)) return false;
      if (dominio.length && !c.dominios.some(d => dominio.includes(d))) return false;
      if (agencia.length && !agencia.includes(c.agencia)) return false;
      if (regiao.length && !regiao.includes(c.regiao)) return false;
      return true;
    }).sort((a,b) => {
      if (sort === 'deadline') return daysBetween(today, a.encerramento) - daysBetween(today, b.encerramento);
      if (sort === 'valor') return (b.valorTotal||0) - (a.valorTotal||0);
      if (sort === 'recente') return daysBetween(a.abertura, today) - daysBetween(b.abertura, today);
      return 0;
    });
  }, [q, dominio, agencia, status, regiao, sort]);

  const abertas = CHAMADAS.filter(c => c.status === 'aberta');
  const proximas = CHAMADAS.filter(c => c.status === 'em-breve');
  const volumeTotal = filtered.reduce((s,c)=>s + (c.valorTotal||0), 0);

  return (
    <div className="page fade-in">
      <SectionHead num="§ 03" kicker="Radar de Fomento" title="Chamadas e editais em movimento"
        lede="Visão executiva das oportunidades de fomento em curso. Filtre por domínio, região, agência e urgência. Cards com tudo o que matters em 5 segundos."
      />

      {/* Top metric strip */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:12, marginBottom:'var(--s-6)' }}>
        <MetricCard label="Chamadas abertas" value={abertas.length} sub="janela ativa" tone="green" />
        <MetricCard label="Em abertura" value={proximas.length} sub="próximos 60 dias" tone="amber" />
        <MetricCard label="Volume em radar" value={fmtMoney(volumeTotal)} sub={`${filtered.length} chamada(s) no filtro atual`} tone="blue" />
        <MetricCard label="Encerram em 15d" value={abertas.filter(c=>daysBetween(today,c.encerramento)<=15).length} sub="prioridade tática" tone="rose" />
      </div>

      {/* Timeline */}
      <Timeline chamadas={filtered.filter(c => c.status !== 'encerrada')} today={today} onFocus={setFocusId} focusId={focusId}/>

      {/* Filters */}
      <div className="card" style={{ padding:'14px 18px', marginTop:'var(--s-5)', marginBottom:'var(--s-5)', display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr auto', gap:14, alignItems:'center' }}>
        <SearchInput value={q} onChange={setQ} placeholder="Buscar chamada, agência, tag…"/>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span className="mono" style={{ color:'var(--text-3)' }}>Status</span>
          <MiniMulti opts={[{id:'aberta',label:'Aberta'},{id:'em-breve',label:'Em breve'},{id:'encerrada',label:'Encerrada'}]} val={status} on={setStatus}/>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span className="mono" style={{ color:'var(--text-3)' }}>Ordem</span>
          <select value={sort} onChange={e=>setSort(e.target.value)} style={{
            padding:'7px 10px', border:'1px solid var(--border-2)', background:'var(--bg-2)',
            color:'var(--text-1)', borderRadius:6, fontSize:12.5, outline:0
          }}>
            <option value="deadline">Por deadline (mais próximo)</option>
            <option value="valor">Por volume (maior)</option>
            <option value="recente">Mais recentes</option>
          </select>
        </div>
        <button className="btn sm ghost" onClick={()=>{ setQ(''); setDominio([]); setAgencia([]); setStatus(['aberta']); setRegiao([]); }}>Limpar</button>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'260px 1fr', gap:'var(--s-6)' }}>
        <aside style={{ display:'flex', flexDirection:'column', gap:18 }}>
          <FilterBlock2 label="Domínio">
            <MultiToggle options={DOMINIOS} value={dominio} onChange={setDominio} />
          </FilterBlock2>
          <FilterBlock2 label="Agência">
            <MultiToggle options={AGENCIAS.map(a=>({id:a.id,label:a.nome}))} value={agencia} onChange={setAgencia} />
          </FilterBlock2>
          <FilterBlock2 label="Região">
            <MultiToggle options={regioes} value={regiao} onChange={setRegiao} />
          </FilterBlock2>
        </aside>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(340px, 1fr))', gap:14, alignContent:'flex-start' }}>
          {filtered.map(c => <ChamadaCard key={c.id} c={c} today={today} highlight={focusId===c.id}/>)}
          {filtered.length === 0 && (
            <div className="card" style={{ padding:'48px 32px', textAlign:'center', color:'var(--text-3)', gridColumn:'1/-1' }}>
              <div className="serif" style={{ fontSize:30, marginBottom:8 }}>Nenhuma chamada bate com esses filtros.</div>
              <div style={{ fontSize:13 }}>Tente alargar os critérios ou marcar status "Em breve" para ver as próximas aberturas.</div>
            </div>
          )}
        </div>
      </div>

    </div>
  );
}

function MetricCard({ label, value, sub, tone }) {
  const toneColor = { green:'var(--green-400)', amber:'var(--amber-500)', blue:'var(--blue-400)', rose:'var(--rose-500)' }[tone] || 'var(--text-1)';
  const toneBg = { green:'var(--green-glow)', amber:'var(--amber-glow)', blue:'var(--blue-glow)', rose:'var(--rose-glow)' }[tone] || 'transparent';
  return (
    <div className="card" style={{ padding:'18px 20px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, right:0, width:120, height:120, background:`radial-gradient(circle at 80% 20%, ${toneBg}, transparent 65%)`, pointerEvents:'none' }}/>
      <div className="mono" style={{ color:'var(--text-3)', marginBottom:8 }}>{label}</div>
      <div style={{ fontFamily:'var(--f-display)', fontSize:38, lineHeight:1, color: toneColor, letterSpacing:'-0.02em' }}>{value}</div>
      <div style={{ fontSize:12, color:'var(--text-3)', marginTop:6 }}>{sub}</div>
    </div>
  );
}

function FilterBlock2({ label, children }) {
  return (
    <div>
      <div className="mono" style={{ color:'var(--text-3)', marginBottom:8 }}>{label}</div>
      {children}
    </div>
  );
}

function MiniMulti({ opts, val, on }) {
  return (
    <div style={{ display:'flex', gap:4, padding:3, background:'var(--bg-2)', borderRadius:6, border:'1px solid var(--border-1)' }}>
      {opts.map(o => {
        const a = val.includes(o.id);
        return (
          <button key={o.id} onClick={()=>on(a?val.filter(v=>v!==o.id):[...val, o.id])}
            style={{
              padding:'4px 10px', borderRadius:4, fontSize:11.5, fontWeight:500,
              background: a ? 'var(--blue-500)' : 'transparent',
              color: a ? 'white' : 'var(--text-3)',
              border:0, cursor:'pointer'
            }}>{o.label}</button>
        );
      })}
    </div>
  );
}

/* ──────────────── Timeline ──────────────── */
function Timeline({ chamadas, today, onFocus, focusId }) {
  const { AGENCIAS, INSTRUMENTOS } = window.ATLAS_DATA;
  // Window: -45d a +180d
  const span = 225;
  const offset = 45;

  const pct = (date) => {
    const d = daysBetween(today, date) + offset;
    return Math.max(0, Math.min(100, (d / span) * 100));
  };

  const ticks = [-30, 0, 30, 60, 90, 120, 180];
  const sorted = [...chamadas].sort((a,b)=>new Date(a.encerramento)-new Date(b.encerramento));

  const [hovered, setHovered] = React.useState(null); // chamada object
  const [hoverPos, setHoverPos] = React.useState({ left:0, top:0 });
  const wrapRef = React.useRef(null);

  const onDotEnter = (c, ev) => {
    setHovered(c);
    const wrap = wrapRef.current?.getBoundingClientRect();
    const dot = ev.currentTarget.getBoundingClientRect();
    if (wrap) {
      setHoverPos({ left: dot.left - wrap.left + dot.width/2, top: dot.top - wrap.top + dot.height + 6 });
    }
  };
  const onDotLeave = () => setHovered(null);
  const onDotClick = (c) => { onFocus(c.id); };

  return (
    <div ref={wrapRef} className="card" style={{ padding:'22px 22px 18px', position:'relative', overflow:'visible' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
        <div>
          <div className="sec-num">Timeline</div>
          <div className="serif" style={{ fontSize:22, marginTop:2 }}>Próximas janelas de submissão</div>
        </div>
        <div className="mono" style={{ color:'var(--text-3)' }}>passe o mouse · clique para destacar o card</div>
      </div>

      <div style={{ position:'relative', height:130, marginTop:18 }}>
        {ticks.map(t => {
          const x = ((t + offset) / span) * 100;
          const isToday = t === 0;
          return (
            <div key={t} style={{
              position:'absolute', left:`${x}%`, top:0, bottom:0,
              borderLeft: isToday ? '1px solid var(--blue-400)' : '1px dashed var(--border-2)',
              opacity: isToday ? 1 : 0.6
            }}>
              <div style={{ position:'absolute', top:0, left:4, color: isToday ? 'var(--blue-400)' : 'var(--text-4)', fontSize:10, fontFamily:'var(--f-mono)', whiteSpace:'nowrap' }}>
                {isToday ? 'HOJE' : (t < 0 ? `${t}d` : `+${t}d`)}
              </div>
            </div>
          );
        })}

        {sorted.map((c, i) => {
          const x = pct(c.encerramento);
          const y = 28 + (i % 5) * 18;
          const tone = c.urgente ? 'var(--rose-500)' : c.status === 'em-breve' ? 'var(--amber-500)' : 'var(--green-500)';
          const isFocus = focusId === c.id || hovered?.id === c.id;
          return (
            <button key={c.id}
              onClick={() => onDotClick(c)}
              onMouseEnter={(e) => onDotEnter(c, e)}
              onMouseLeave={onDotLeave}
              onFocus={(e) => onDotEnter(c, e)}
              onBlur={onDotLeave}
              aria-label={c.titulo}
              style={{
                position:'absolute',
                left:`${x}%`, top:y,
                width: isFocus ? 16 : 11, height: isFocus ? 16 : 11,
                marginLeft: isFocus ? -8 : -5.5,
                marginTop: isFocus ? -8 : -5.5,
                borderRadius: 99,
                background: tone,
                border:'2px solid var(--bg-card)',
                boxShadow: `0 0 0 ${isFocus ? 7 : 2}px ${tone}33`,
                cursor:'pointer',
                padding:0,
                transition:'all .15s ease'
              }}
            />
          );
        })}
      </div>

      <div style={{ display:'flex', gap:18, marginTop:10, fontSize:11, color:'var(--text-3)' }}>
        <span style={{ display:'flex', alignItems:'center', gap:5 }}><span style={{ width:8, height:8, borderRadius:99, background:'var(--green-500)' }}/>Aberta</span>
        <span style={{ display:'flex', alignItems:'center', gap:5 }}><span style={{ width:8, height:8, borderRadius:99, background:'var(--amber-500)' }}/>Em breve</span>
        <span style={{ display:'flex', alignItems:'center', gap:5 }}><span style={{ width:8, height:8, borderRadius:99, background:'var(--rose-500)' }}/>Encerra logo</span>
      </div>

      {hovered && (() => {
        const c = hovered;
        const dias = daysBetween(today, c.encerramento);
        const ag = AGENCIAS.find(a => a.id === c.agencia);
        const instr = INSTRUMENTOS.find(i => i.id === c.instrumento);
        const tone = c.urgente ? 'var(--rose-500)' : c.status === 'em-breve' ? 'var(--amber-500)' : 'var(--green-500)';
        const wrapW = wrapRef.current?.getBoundingClientRect().width || 0;
        // Keep tooltip inside the card horizontally
        const TIP_W = 320;
        const halfW = TIP_W / 2;
        const leftClamped = Math.max(halfW + 12, Math.min(wrapW - halfW - 12, hoverPos.left));
        return (
          <div style={{
            position:'absolute', left: leftClamped, top: hoverPos.top + 8,
            transform:'translateX(-50%)',
            width: TIP_W,
            background:'var(--bg-elev)',
            border:`1px solid ${tone}`,
            borderRadius:'var(--r-3)',
            padding:'12px 14px',
            boxShadow:'var(--shadow-3)',
            pointerEvents:'none',
            zIndex:30,
            fontSize:12.5,
            color:'var(--text-1)'
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
              <span className="mono" style={{ color:tone, fontSize:10 }}>{ag?.nome || c.agencia.toUpperCase()}</span>
              <StatusChip status={c.status} urgente={c.urgente}/>
            </div>
            <div style={{ fontWeight:600, fontSize:13, lineHeight:1.3, marginBottom:8 }}>{c.titulo}</div>
            <p style={{ fontSize:11.5, color:'var(--text-3)', lineHeight:1.45, margin:'0 0 10px' }}>
              {c.resumo}
            </p>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, paddingTop:8, borderTop:'1px solid var(--border-1)' }}>
              <div>
                <div className="mono" style={{ color:'var(--text-4)', fontSize:9 }}>ENCERRA</div>
                <div style={{ fontFamily:'var(--f-display)', fontSize:18, color: dias <= 15 ? 'var(--rose-500)' : 'var(--text-1)', lineHeight:1.1 }}>
                  {c.status === 'aberta' ? `${dias}d` : `+${daysBetween(today, c.abertura)}d`}
                </div>
              </div>
              <div>
                <div className="mono" style={{ color:'var(--text-4)', fontSize:9 }}>VOLUME</div>
                <div style={{ fontFamily:'var(--f-display)', fontSize:18, color:'var(--blue-400)', lineHeight:1.1 }}>{fmtMoney(c.valorTotal)}</div>
              </div>
              <div>
                <div className="mono" style={{ color:'var(--text-4)', fontSize:9 }}>REGIÃO</div>
                <div style={{ fontFamily:'var(--f-display)', fontSize:15, color:'var(--text-1)', lineHeight:1.1 }}>{c.regiao}</div>
              </div>
            </div>
            <div style={{ marginTop:8, fontSize:10.5, color:'var(--text-3)' }}>
              <strong style={{ color:'var(--text-2)' }}>Público:</strong> {c.publico}
              {instr && <> · <strong style={{ color:'var(--text-2)' }}>Instrumento:</strong> {instr.sigla}</>}
            </div>
            <div style={{ marginTop:6, fontSize:10, color:'var(--blue-400)', fontFamily:'var(--f-mono)' }}>
              clique para ir ao card abaixo
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ──────────────── Chamada Card ──────────────── */
function ChamadaCard({ c, today, highlight }) {
  const [open, setOpen] = React.useState(highlight);
  const dias = daysBetween(today, c.encerramento);
  const diasAbertura = daysBetween(today, c.abertura);
  const { AGENCIAS, INSTRUMENTOS } = window.ATLAS_DATA;
  const ag = AGENCIAS.find(a => a.id === c.agencia);
  const instr = INSTRUMENTOS.find(i => i.id === c.instrumento);

  React.useEffect(() => { if (highlight) setOpen(true); }, [highlight]);

  return (
    <div className="card slide-up" style={{
      padding: 0,
      display:'flex', flexDirection:'column',
      borderColor: highlight ? 'var(--blue-500)' : '',
      boxShadow: highlight ? '0 0 0 1px var(--blue-500), var(--shadow-2)' : ''
    }}>
      {/* Header */}
      <div style={{ padding:'16px 18px 12px', display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
          <div>
            <div className="mono" style={{ color:'var(--blue-400)', marginBottom:4 }}>{ag?.nome || c.agencia.toUpperCase()}</div>
            <h4 className="h4" style={{ fontSize:14.5, lineHeight:1.35 }}>{c.titulo}</h4>
          </div>
          <StatusChip status={c.status} urgente={c.urgente}/>
        </div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
          {c.dominios.slice(0,4).map(d => {
            const dom = window.ATLAS_DATA.DOMINIOS.find(x=>x.id===d);
            return <Chip key={d}><span style={{ width:6,height:6,borderRadius:99,background:dom?.cor }}/>{dom?.label}</Chip>;
          })}
        </div>
      </div>

      {/* Stats row */}
      <div style={{
        display:'grid', gridTemplateColumns:'1fr 1fr 1fr',
        padding:'12px 18px',
        background:'var(--bg-2)',
        borderTop:'1px solid var(--border-1)', borderBottom:'1px solid var(--border-1)'
      }}>
        <div>
          <div className="mono" style={{ color:'var(--text-4)', fontSize:9 }}>{c.status==='aberta' ? 'ENCERRA EM' : 'ABRE EM'}</div>
          <div style={{ fontFamily:'var(--f-display)', fontSize:22, color: c.status==='aberta' && dias <= 15 ? 'var(--rose-500)' : c.status==='em-breve' ? 'var(--amber-500)' : 'var(--text-1)', lineHeight:1.1 }}>
            {c.status==='aberta' ? `${dias}d` : `${diasAbertura}d`}
          </div>
        </div>
        <div>
          <div className="mono" style={{ color:'var(--text-4)', fontSize:9 }}>VOLUME</div>
          <div style={{ fontFamily:'var(--f-display)', fontSize:22, color:'var(--blue-400)', lineHeight:1.1 }}>{fmtMoney(c.valorTotal)}</div>
        </div>
        <div>
          <div className="mono" style={{ color:'var(--text-4)', fontSize:9 }}>REGIÃO</div>
          <div style={{ fontFamily:'var(--f-display)', fontSize:20, color:'var(--text-1)', lineHeight:1.1 }}>{c.regiao}</div>
        </div>
      </div>

      {/* Body */}
      <div style={{ padding:'14px 18px', flex:1, display:'flex', flexDirection:'column', gap:10 }}>
        <p style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.5, margin:0 }}>{c.resumo}</p>

        {open && (
          <div style={{ display:'flex', flexDirection:'column', gap:8, paddingTop:8, borderTop:'1px solid var(--border-1)' }} className="fade-in">
            <Row k="Modalidade" v={c.categoria}/>
            <Row k="Público" v={c.publico}/>
            <Row k="Ticket" v={c.valor}/>
            <Row k="Abertura" v={formatDateBR(c.abertura)}/>
            <Row k="Encerramento" v={formatDateBR(c.encerramento)}/>
            {instr && <Row k="Instrumento" v={<a href={`#/instrumento/${instr.id}`} style={{ color:'var(--blue-400)' }}>{instr.sigla} →</a>}/>}
            {c.tags?.length > 0 && <Row k="Tags" v={c.tags.map(t => <Chip key={t}>{t}</Chip>)}/>}
          </div>
        )}
      </div>

      <div style={{ padding:'10px 14px', borderTop:'1px solid var(--border-1)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <button onClick={()=>setOpen(o=>!o)} className="btn sm ghost">
          {open ? 'Recolher' : 'Detalhes executivos'} <I.chev style={{ transform: open ? 'rotate(90deg)' : '', transition:'.2s' }}/>
        </button>
        {instr && (
          <a href={`#/instrumento/${instr.id}`} className="btn sm">Ficha do instrumento <I.arrow/></a>
        )}
      </div>
    </div>
  );
}

function Row({ k, v }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'90px 1fr', gap:10, fontSize:12 }}>
      <div className="mono" style={{ color:'var(--text-4)' }}>{k}</div>
      <div style={{ color:'var(--text-1)', display:'flex', flexWrap:'wrap', gap:4 }}>{v}</div>
    </div>
  );
}

window.Radar = Radar;

/* Atlas da Inovação — Mapa de ICTs */

function Mapa() {
  const { ICTS, DOMINIOS } = window.ATLAS_DATA;
  const [dominio, setDominio] = React.useState([]);
  const [credenc, setCredenc] = React.useState([]);
  const [regiao, setRegiao] = React.useState([]);
  const [q, setQ] = React.useState('');
  const [hover, setHover] = React.useState(null);
  const [selected, setSelected] = React.useState(null);
  const [modalUF, setModalUF] = React.useState(null);
  const [matrixCell, setMatrixCell] = React.useState(null); // { domain: domObj, region: 'Sul' } or null

  const credenciamentos = ['ANP','Embrapii','Lei de Informática','ANEEL','ISI'];
  const regioes = [
    { id:'Norte', label:'Norte' },
    { id:'Nordeste', label:'Nordeste' },
    { id:'Centro-Oeste', label:'Centro-Oeste' },
    { id:'Sudeste', label:'Sudeste' },
    { id:'Sul', label:'Sul' }
  ];

  const filtered = React.useMemo(() => {
    return ICTS.filter(i => {
      if (q && !`${i.nome} ${i.longo} ${i.cidade}`.toLowerCase().includes(q.toLowerCase())) return false;
      if (dominio.length && !i.dominios.some(d => dominio.includes(d))) return false;
      if (credenc.length && !i.credenciamentos.some(c => credenc.includes(c))) return false;
      if (regiao.length && !regiao.includes(i.regiao)) return false;
      return true;
    });
  }, [ICTS, q, dominio, credenc, regiao]);

  return (
    <div className="page fade-in">
      <SectionHead num="§ 04" kicker="Mapa de ICTs" title="ICTs brasileiras"
        lede="Universidades, centros de pesquisa e ICTs privadas mapeadas por geografia, domínio tecnológico e credenciamentos. Selecione filtros para refinar o atlas."
      />

      <div style={{ display:'grid', gridTemplateColumns:'260px 1fr 360px', gap:'var(--s-5)' }}>
        {/* Filters */}
        <aside style={{ display:'flex', flexDirection:'column', gap:18 }}>
          <SearchInput value={q} onChange={setQ} placeholder="Buscar ICT, cidade…"/>
          <FilterBlock2 label="Região">
            <MultiToggle options={regioes} value={regiao} onChange={setRegiao} />
          </FilterBlock2>
          <FilterBlock2 label="Domínio">
            <MultiToggle options={DOMINIOS} value={dominio} onChange={setDominio} />
          </FilterBlock2>
          <FilterBlock2 label="Credenciamentos">
            <MultiToggle options={credenciamentos.map(c=>({id:c,label:c}))} value={credenc} onChange={setCredenc} />
          </FilterBlock2>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:8, borderTop:'1px solid var(--border-1)' }}>
            <span className="mono" style={{ color:'var(--text-3)' }}>{filtered.length} de {ICTS.length}</span>
            <button className="btn sm ghost" onClick={()=>{ setQ(''); setDominio([]); setCredenc([]); setRegiao([]); }}>Limpar</button>
          </div>
        </aside>

        {/* Map */}
        <div className="card" style={{ padding:'18px 18px 12px', position:'relative', overflow:'hidden', minHeight: 620 }}>
          <BrazilMap icts={filtered} hover={hover} setHover={setHover} selected={selected} setSelected={setSelected} onClusterClick={setModalUF}/>
        </div>

        {/* List / detail */}
        <aside style={{ display:'flex', flexDirection:'column', gap:14 }}>
          {selected ? (
            <ICTDetailCard ict={selected} onClose={()=>setSelected(null)}/>
          ) : (
            <>
              <div className="mono" style={{ color:'var(--text-3)' }}>Lista filtrada</div>
              <div style={{ display:'flex', flexDirection:'column', gap:8, maxHeight:580, overflowY:'auto', paddingRight:6 }}>
                {filtered.map(i => (
                  <button key={i.id} onClick={()=>setSelected(i)}
                    onMouseEnter={()=>setHover(i.id)} onMouseLeave={()=>setHover(null)}
                    className="card" style={{
                      padding:'10px 12px', textAlign:'left', cursor:'pointer',
                      background: hover===i.id ? 'var(--bg-elev)' : 'var(--bg-card)',
                      borderColor: hover===i.id ? 'var(--border-3)' : '',
                      transition: 'all .12s ease'
                    }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:'var(--text-1)' }}>{i.nome}</div>
                      <span className="mono" style={{ color:'var(--text-4)' }}>{i.uf}</span>
                    </div>
                    <div style={{ fontSize:11, color:'var(--text-3)' }}>{i.cidade} · {i.tipo}</div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginTop:6 }}>
                      {i.dominios.slice(0,4).map(d => {
                        const dom = window.ATLAS_DATA.DOMINIOS.find(x=>x.id===d);
                        return <span key={d} style={{ width:7, height:7, borderRadius:99, background:dom?.cor }} title={dom?.label}/>;
                      })}
                    </div>
                  </button>
                ))}
                {filtered.length === 0 && <div className="muted" style={{ fontSize:13 }}>Nenhuma ICT bate com esses filtros.</div>}
              </div>
            </>
          )}
        </aside>
      </div>

      {/* Domain × Region matrix */}
      <div style={{ marginTop:'var(--s-7)' }}>
        <SectionHead num="§ 04.1" title="Densidade competências × regiões"
          lede="Quantas ICTs do atlas operam em cada domínio por região. Clique em um número para ver as ICTs daquela combinação."/>
        <DomainRegionMatrix icts={filtered} onCellClick={(domain, region) => setMatrixCell({ domain, region })}/>
      </div>

      {modalUF && (
        <ICTListModal
          title={STATES[modalUF]?.nome || modalUF}
          kicker={`${modalUF} · ${filtered.filter(i => i.uf === modalUF).length} ICT(s)`}
          backLabel={`Voltar à lista de ${modalUF}`}
          icts={filtered.filter(i => i.uf === modalUF)}
          onClose={()=>setModalUF(null)}
          onPick={(ict)=>{ setSelected(ict); setModalUF(null); }}/>
      )}

      {matrixCell && (() => {
        const cellIcts = filtered.filter(i => i.regiao === matrixCell.region && i.dominios.includes(matrixCell.domain.id));
        return (
          <ICTListModal
            title={`${matrixCell.domain.label} · ${matrixCell.region}`}
            kicker={`${cellIcts.length} ICT(s) atuam neste domínio na região ${matrixCell.region}`}
            backLabel="Voltar à lista"
            icts={cellIcts}
            onClose={()=>setMatrixCell(null)}
            onPick={(ict)=>{ setSelected(ict); setMatrixCell(null); }}/>
        );
      })()}
    </div>
  );
}

/* ──────────────── Brazil Map (image background) ────────────────
   Layer order (bottom→top):
   1. User-supplied Brazil regions image (data URL, full-color)
   2. Faint UF labels for states without ICTs in the filter
   3. ICT cluster circles (size = #ICTs in that UF). Click → UFListModal.
   The image already has region labels (NORTE/NORDESTE/etc.) baked in.
   ──────────────────────────────────────────────────────────────── */

function BrazilMap({ icts, hover, setHover, selected, setSelected, onClusterClick }) {
  // viewBox matches the ~1:1 outline image; extra 80px at the bottom hosts the legend.
  const W = 1000, H = 1080;
  const IMG_W = 1000, IMG_H = 1000;
  const px = (x) => x * IMG_W;
  const py = (y) => y * IMG_H;

  const byState = React.useMemo(() => {
    const m = {};
    icts.forEach(i => {
      const s = STATES[i.uf];
      if (!s) return;
      if (!m[i.uf]) m[i.uf] = { uf:i.uf, x:px(s.x), y:py(s.y), nome:s.nome, items:[] };
      m[i.uf].items.push(i);
    });
    return Object.values(m);
  }, [icts]);

  return (
    <div style={{ position:'relative', width:'100%', aspectRatio: `${W}/${H}` }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', height:'100%', display:'block' }}>
        <defs>
          <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
            <circle cx="7" cy="7" r="0.7" fill="rgba(120,160,220,0.18)"/>
          </pattern>
          <radialGradient id="glow-blue">
            <stop offset="0%" stopColor="rgba(59,130,246,0.5)"/>
            <stop offset="100%" stopColor="rgba(59,130,246,0)"/>
          </radialGradient>
        </defs>

        {/* Brazil outline image (transparent webp). Invert + tint for dark theme. */}
        <defs>
          <filter id="brazil-outline-tint">
            <feColorMatrix type="matrix" values="
              0 0 0 0  0.58
              0 0 0 0  0.78
              0 0 0 0  1
              0 0 0 0.85 0"/>
          </filter>
        </defs>
        <image
          href={window.BRAZIL_MAP_DATA_URL}
          x="0" y="0"
          width={IMG_W} height={IMG_H}
          preserveAspectRatio="xMidYMid meet"
          filter="url(#brazil-outline-tint)"
        />

        {/* Tiny markers for states with no ICT in the current filter (the image already shows state names) */}
        {Object.entries(STATES).map(([uf, s]) => {
          const has = byState.some(b => b.uf === uf);
          if (has) return null;
          return (
            <circle key={uf} cx={px(s.x)} cy={py(s.y)} r={4} fill="#fff" stroke="rgba(0,0,0,0.45)" strokeWidth="0.8" opacity="0.55"/>
          );
        })}

        {/* ICT clusters — colors tuned for the dark theme over the tinted outline */}
        {byState.map(s => {
          const r = 8 + Math.min(s.items.length, 6) * 2.5;
          const isHovered = s.items.some(i => i.id === hover) || s.items.some(i => i.id === selected?.id);
          const hasDestaque = s.items.some(i => i.destaque);
          const coreFill = hasDestaque ? '#3b82f6' : '#1e40af';
          const ringStroke = isHovered ? '#93c5fd' : '#60a5fa';
          return (
            <g key={s.uf} style={{ cursor:'pointer' }}
               onMouseEnter={()=>setHover(s.items[0].id)} onMouseLeave={()=>setHover(null)}
               onClick={()=> onClusterClick ? onClusterClick(s.uf) : setSelected(s.items[0])}>
              <circle cx={s.x} cy={s.y} r={r*2.4} fill="url(#glow-blue)" opacity={isHovered ? 1 : 0.55}/>
              <circle cx={s.x} cy={s.y} r={r} fill={coreFill} stroke={ringStroke} strokeWidth={isHovered ? 2.5 : 1.5} style={{ filter:'drop-shadow(0 2px 5px rgba(0,0,0,0.55))' }}/>
              <text x={s.x} y={s.y + 4} textAnchor="middle" fill="white" fontFamily="var(--f-mono)" fontSize={r > 12 ? '13' : '11'} fontWeight="700" pointerEvents="none">
                {s.items.length}
              </text>
              <text x={s.x} y={s.y - r - 7} textAnchor="middle" fill={isHovered ? '#dbeafe' : '#cbd5e1'} fontFamily="var(--f-mono)" fontSize="10.5" fontWeight="700" letterSpacing="0.06em" pointerEvents="none"
                    style={{ textTransform:'uppercase', paintOrder:'stroke', stroke:'rgba(10,22,40,0.85)', strokeWidth:3, strokeLinejoin:'round' }}>
                {s.uf}
              </text>
              <text x={s.x} y={s.y + r + 13} textAnchor="middle" fill="#cbd5e1" fontFamily="var(--f-body)" fontSize="10.5" pointerEvents="none"
                    style={{ paintOrder:'stroke', stroke:'rgba(10,22,40,0.8)', strokeWidth:3, strokeLinejoin:'round' }}>
                {s.items.slice(0,2).map(i => i.nome.split('/')[0].split(' ')[0]).join(' · ')}
                {s.items.length > 2 ? ` +${s.items.length - 2}` : ''}
              </text>
              {/* Click overlay for easier hit area */}
              <circle cx={s.x} cy={s.y} r={r + 12} fill="transparent"/>
            </g>
          );
        })}

        {/* Legend */}
        <g transform={`translate(28, ${IMG_H + 18})`}>
          <text fill="var(--text-3)" fontFamily="var(--f-mono)" fontSize="10" letterSpacing="0.14em" style={{ textTransform:'uppercase' }}>Legenda</text>
          <g transform="translate(0, 18)">
            <circle r="6" fill="#3b82f6" stroke="#93c5fd" strokeWidth="1.2"/>
            <text x="12" y="4" fill="var(--text-2)" fontSize="11.5">ICT em destaque</text>
          </g>
          <g transform="translate(170, 18)">
            <circle r="6" fill="#1e40af" stroke="#60a5fa" strokeWidth="1.2"/>
            <text x="12" y="4" fill="var(--text-2)" fontSize="11.5">ICT mapeada</text>
          </g>
          <text x="0" y="52" fill="var(--text-4)" fontSize="11">Clique no número para ver as ICTs daquela UF. Tamanho do círculo ∝ nº de ICTs no filtro.</text>
        </g>
      </svg>
    </div>
  );
}

/* ──────────────── UF List Modal ──────────────── */
/**
 * Generic ICT list modal. Props:
 *   - title, kicker, subtitle : strings rendered in the header (kicker is the small mono line above the title)
 *   - backLabel               : label for the "voltar" button shown in detail mode (e.g. "Voltar à lista de AM")
 *   - icts                    : array of ICT objects to list
 *   - onClose, onPick         : callbacks
 */
function ICTListModal({ title, kicker, subtitle, backLabel, icts, onClose, onPick }) {
  const { DOMINIOS } = window.ATLAS_DATA;
  const [picked, setPicked] = React.useState(null);

  // Use refs so the keyboard handler always sees current state without re-binding.
  const pickedRef = React.useRef(picked);
  pickedRef.current = picked;
  const handleClose = React.useCallback(() => {
    if (pickedRef.current && onPick) onPick(pickedRef.current);
    onClose();
  }, [onClose, onPick]);
  const handlePick = (i) => setPicked(i); // show detail inside modal — do NOT close it

  // Lock body scroll while modal is open + close on Escape (or go back from detail).
  React.useEffect(() => {
    const onEsc = (e) => {
      if (e.key !== 'Escape') return;
      if (pickedRef.current) setPicked(null);
      else handleClose();
    };
    window.addEventListener('keydown', onEsc);
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', onEsc);
      document.body.style.overflow = prevOverflow;
    };
  }, [handleClose]);

  const overlay = (
    <div onMouseDown={(e) => { if (e.target === e.currentTarget) handleClose(); }} style={{
      position:'fixed', top:0, left:0, width:'100vw', height:'100vh', zIndex:2000,
      background:'rgba(0,0,0,0.62)', backdropFilter:'blur(4px)',
      WebkitBackdropFilter:'blur(4px)',
      display:'flex', alignItems:'center', justifyContent:'center', padding:'24px',
      overflowY:'auto'
    }}>
      <div className="card slide-up" style={{
        width:'100%', maxWidth: picked ? 720 : 920,
        maxHeight:'min(90vh, 820px)',
        display:'flex', flexDirection:'column',
        margin:'auto'
      }}>
        {/* Header */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:14,
                       padding:'20px 24px 14px', borderBottom:'1px solid var(--border-1)', flexShrink:0 }}>
          <div>
            {picked ? (
              <>
                <button onClick={()=>setPicked(null)} className="btn sm" style={{ marginBottom:10 }}>
                  ← {backLabel || 'Voltar'}
                </button>
                <div className="sec-num" style={{ color:'var(--blue-400)' }}>{picked.regiao} · {picked.uf}</div>
                <h2 className="serif" style={{ fontSize:30, lineHeight:1.05, margin:'4px 0 0' }}>{picked.nome}</h2>
              </>
            ) : (
              <>
                <div className="sec-num" style={{ color:'var(--blue-400)' }}>{kicker}</div>
                <h2 className="serif" style={{ fontSize:32, lineHeight:1.05, margin:'4px 0 0' }}>{title}</h2>
                <p style={{ color:'var(--text-3)', fontSize:13, margin:'8px 0 0', maxWidth:'60ch' }}>
                  {subtitle || 'Clique em uma ICT para ver site, contatos, linhas de pesquisa, áreas de atuação e projetos.'}
                </p>
              </>
            )}
          </div>
          <button onClick={handleClose} className="btn" style={{ flexShrink:0 }}><I.close/> Fechar</button>
        </div>

        {/* Body — scrollable */}
        <div style={{ flex:1, overflowY:'auto', padding:'18px 24px 24px' }}>
          {picked ? (
            <ICTDetailBody ict={picked}/>
          ) : (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:12 }}>
              {icts.map(i => (
                <button key={i.id} type="button" onClick={()=>handlePick(i)} className="card" style={{
                  padding:'14px 16px', textAlign:'left', cursor:'pointer',
                  display:'flex', flexDirection:'column', gap:8,
                  transition:'border-color .15s ease, transform .15s ease',
                  background:'var(--bg-card)', border:'1px solid var(--border-1)',
                  borderRadius:'var(--r-3)', font:'inherit', color:'inherit', width:'100%'
                }}
                onMouseEnter={e => { e.currentTarget.style.borderColor='var(--blue-500)'; e.currentTarget.style.transform='translateY(-1px)'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor=''; e.currentTarget.style.transform=''; }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
                    <div style={{ fontSize:14, fontWeight:600, color:'var(--text-1)' }}>{i.nome}</div>
                    {i.destaque && <span className="chip solid" style={{ fontSize:9 }}>destaque</span>}
                  </div>
                  <div style={{ fontSize:11.5, color:'var(--text-3)', fontFamily:'var(--f-display)', fontStyle:'italic' }}>{i.longo}</div>
                  <div style={{ fontSize:11, color:'var(--text-4)' }}>{i.cidade} · {i.tipo}</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginTop:2 }}>
                    {i.dominios.slice(0,5).map(d => {
                      const dom = DOMINIOS.find(x=>x.id===d);
                      return <span key={d} title={dom?.label} style={{ width:9, height:9, borderRadius:99, background:dom?.cor }}/>;
                    })}
                    {i.dominios.length > 5 && <span style={{ fontSize:10, color:'var(--text-4)' }}>+{i.dominios.length-5}</span>}
                  </div>
                  {i.credenciamentos.length > 0 && (
                    <div style={{ display:'flex', flexWrap:'wrap', gap:4, paddingTop:6, borderTop:'1px solid var(--border-1)' }}>
                      {i.credenciamentos.map(c => <Chip key={c} tone="solid" style={{fontSize:9}}>{c}</Chip>)}
                    </div>
                  )}
                  <div style={{ marginTop:'auto', paddingTop:8, fontSize:11, color:'var(--blue-400)', fontWeight:600, display:'flex', alignItems:'center', gap:4 }}>
                    Ver ficha completa <I.arrow/>
                  </div>
                </button>
              ))}
              {icts.length === 0 && (
                <div className="muted" style={{ fontSize:13, gridColumn:'1/-1', textAlign:'center', padding:32 }}>
                  Nenhuma ICT cadastrada para {ufName} nesta versão do atlas.
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );

  // Portal to document.body so the modal escapes any stacking-context / scroll-container ancestor.
  return ReactDOM.createPortal(overlay, document.body);
}

/* ──────────────── Domain × Region matrix ──────────────── */
function DomainRegionMatrix({ icts, onCellClick }) {
  const { DOMINIOS } = window.ATLAS_DATA;
  const regs = ['Norte','Nordeste','Centro-Oeste','Sudeste','Sul'];
  const grid = {};
  let max = 0;
  DOMINIOS.forEach(d => {
    grid[d.id] = {};
    regs.forEach(r => {
      const n = icts.filter(i => i.regiao === r && i.dominios.includes(d.id)).length;
      grid[d.id][r] = n;
      if (n > max) max = n;
    });
  });

  return (
    <div className="card" style={{ padding:'16px 18px', overflow:'auto' }}>
      <table style={{ width:'100%', borderCollapse:'collapse', minWidth:600 }}>
        <thead>
          <tr>
            <th style={{ textAlign:'left', padding:'6px 12px' }}></th>
            {regs.map(r => (
              <th key={r} style={{ padding:'6px 12px', textAlign:'center' }} className="mono">
                <span style={{ color:'var(--text-3)' }}>{r}</span>
              </th>
            ))}
            <th style={{ padding:'6px 12px', textAlign:'right' }} className="mono"><span style={{ color:'var(--text-4)' }}>Σ</span></th>
          </tr>
        </thead>
        <tbody>
          {DOMINIOS.map(d => {
            const total = regs.reduce((s,r)=>s+grid[d.id][r], 0);
            return (
              <tr key={d.id} style={{ borderTop:'1px solid var(--border-1)' }}>
                <td style={{ padding:'8px 12px' }}>
                  <DomainDot id={d.id} label={true}/>
                </td>
                {regs.map(r => {
                  const n = grid[d.id][r];
                  const intensity = max > 0 ? n / max : 0;
                  const clickable = n > 0 && onCellClick;
                  return (
                    <td key={r} style={{ padding:'4px', textAlign:'center' }}>
                      <button
                        type="button"
                        disabled={!clickable}
                        onClick={() => clickable && onCellClick(d, r)}
                        title={clickable ? `Ver ${n} ICT(s) de ${d.label} no ${r}` : ''}
                        style={{
                          width:'100%', maxWidth:54, height:32, margin:'0 auto', padding:0,
                          background: n === 0 ? 'var(--bg-2)' : `color-mix(in oklab, ${d.cor} ${intensity*70+10}%, transparent)`,
                          border: '1px solid var(--border-1)',
                          borderRadius:4,
                          display:'grid', placeItems:'center',
                          fontFamily:'var(--f-mono)', fontSize:12,
                          color: n === 0 ? 'var(--text-5)' : (intensity > 0.5 ? 'white' : 'var(--text-1)'),
                          fontWeight: n > 0 ? 600 : 400,
                          cursor: clickable ? 'pointer' : 'default',
                          transition: 'transform .12s ease, box-shadow .12s ease'
                        }}
                        onMouseEnter={e => { if (clickable) { e.currentTarget.style.transform='scale(1.08)'; e.currentTarget.style.boxShadow='0 0 0 1.5px var(--blue-400)'; } }}
                        onMouseLeave={e => { if (clickable) { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow=''; } }}
                      >
                        {n || '·'}
                      </button>
                    </td>
                  );
                })}
                <td style={{ padding:'4px 12px', textAlign:'right', fontFamily:'var(--f-mono)', color:'var(--text-2)', fontSize:13 }}>{total}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   GUIA — Como escrever um bom projeto
   ════════════════════════════════════════════════════════════ */
function Guia() {

  const toggleCheck = (capId, k) => {
    setChecks(prev => ({ ...prev, [`${capId}-${k}`]: !prev[`${capId}-${k}`] }));
  };

  const totalChecks = GUIA.reduce((s,c)=>s+c.checklist.length, 0);
  const doneChecks = Object.values(checks).filter(Boolean).length;

  return (
    <div className="page fade-in">
      <SectionHead num="§ 05" kicker="Guia" title="Como escrever um bom projeto"
        lede="Oito capítulos sobre o que separa uma proposta vencedora de uma negada. Use o checklist ao final de cada capítulo como ponto de controle antes de submeter."
        right={<div style={{ textAlign:'right' }}>
          <div className="mono" style={{ color:'var(--text-3)' }}>Checklist</div>
          <div style={{ fontFamily:'var(--f-display)', fontSize:28, color:'var(--blue-400)' }}>{doneChecks}<span style={{ color:'var(--text-4)', fontSize:18 }}>/{totalChecks}</span></div>

        {/* Sidebar nav */}
        <aside style={{ position:'sticky', top:80, alignSelf:'flex-start' }}>
          <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
            {GUIA.map((c, k) => {
              const checked = c.checklist.filter((_,i)=>checks[`${c.id}-${i}`]).length;
              const all = c.checklist.length;
              const isActive = active === c.id;
              return (
                <button key={c.id} onClick={()=>setActive(c.id)}
                  style={{
                    display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10,
                    padding:'12px 14px',
                    background: isActive ? 'var(--bg-2)' : 'transparent',
                    border: '1px solid',
                    borderColor: isActive ? 'var(--border-3)' : 'transparent',
                    borderRadius: 8,
                    textAlign:'left',
                    cursor:'pointer',
                    transition:'all .12s ease'

                    {checked}/{all}

                </button>
              );
            })}
          </div>
        </aside>

        {/* Active chapter */}
        <article style={{ display:'flex', flexDirection:'column', gap:'var(--s-5)' }}>
          <header>
            <div className="sec-num" style={{ color:'var(--blue-400)', marginBottom:8 }}>Capítulo {String(idx+1).padStart(2,'0')} de {GUIA.length}</div>
            <h1 className="serif" style={{ fontSize:'clamp(36px, 4vw, 54px)', lineHeight:1, margin:0, letterSpacing:'-0.015em' }}>{cap.titulo.replace(/^\d+\.\s*/, '')}</h1>
            <p style={{ color:'var(--text-2)', fontSize:17, lineHeight:1.55, marginTop:18, fontFamily:'var(--f-display)', fontStyle:'italic', maxWidth:'60ch' }}>{cap.resumo}</p>
          </header>

          <section className="card" style={{ padding:'24px 28px' }}>
            <div className="sec-num" style={{ marginBottom:14 }}>Princípios</div>
            <ul style={{ listStyle:'none', padding:0, margin:0, display:'flex', flexDirection:'column', gap:18 }}>

                <li key={k} style={{ display:'flex', gap:14, alignItems:'flex-start' }}>
                  <div style={{
                    flexShrink:0, width:24, height:24, borderRadius:99,
                    border:'1px solid var(--border-3)',
                    display:'grid', placeItems:'center',
                    color:'var(--blue-400)',
                    fontFamily:'var(--f-mono)', fontSize:10,
                    background:'var(--bg-2)'
                  }}>{k+1}</div>
                  <p style={{ margin:0, color:'var(--text-1)', fontSize:14.5, lineHeight:1.6 }}>{p}</p>

            <button disabled={idx===GUIA.length-1} onClick={()=>setActive(GUIA[idx+1]?.id)} className="btn primary" style={{ opacity: idx===GUIA.length-1 ? 0.4 : 1 }}>Próximo capítulo →</button>
          </nav>
        </article>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   GLOSSÁRIO
   ════════════════════════════════════════════════════════════ */
function Glossario() {
  const { GLOSSARIO } = window.ATLAS_DATA;
  const [q, setQ] = React.useState('');
  const sorted = [...GLOSSARIO].sort((a,b)=>a.termo.localeCompare(b.termo));
  const filtered = sorted.filter(g => !q || `${g.termo} ${g.expansao} ${g.def}`.toLowerCase().includes(q.toLowerCase()));

  // Group by first letter
  const groups = {};
  filtered.forEach(g => {
    const letter = g.termo[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(g);
  });
  const letters = Object.keys(groups).sort();

  return (
    <div className="page fade-in">
      <SectionHead num="§ 06" kicker="Vocabulário" title="Glossário & Credenciamentos"
        lede="Termos, siglas e mecanismos que circulam pelo ecossistema brasileiro de inovação."
        right={<div style={{ width:280 }}><SearchInput value={q} onChange={setQ} placeholder="Buscar termo…"/></div>}
      />

      {/* Letter index */}
      <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:'var(--s-6)' }}>
        {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(L => {
          const has = !!groups[L];
          return (
            <a key={L} href={`#letter-${L}`} onClick={e=>{e.preventDefault(); if (has) document.getElementById(`letter-${L}`)?.scrollIntoView({ block:'start' });}}
              style={{
                width:30, height:30, display:'grid', placeItems:'center',
                borderRadius:6,
                color: has ? 'var(--text-1)' : 'var(--text-5)',
                background: has ? 'var(--bg-2)' : 'transparent',
                border: '1px solid',
                borderColor: has ? 'var(--border-2)' : 'transparent',
                fontFamily:'var(--f-mono)', fontSize:12,
                cursor: has ? 'pointer' : 'default'
              }}>{L}</a>
          );
        })}
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:'var(--s-6)' }}>
        {letters.map(L => (
          <section key={L} id={`letter-${L}`}>
            <div style={{ display:'flex', alignItems:'baseline', gap:14, marginBottom:14 }}>
              <span className="serif" style={{ fontSize:48, color:'var(--blue-400)', lineHeight:1 }}>{L}</span>
              <span className="mono" style={{ color:'var(--text-4)' }}>{groups[L].length} termo(s)</span>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:12 }}>
              {groups[L].map(g => (
                <div key={g.termo} className="card" style={{ padding:'14px 16px', display:'flex', flexDirection:'column', gap:8 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:6 }}>
                    <h4 className="h4" style={{ fontSize:15 }}>{g.termo}</h4>
                  </div>
                  <div style={{ fontSize:11.5, color:'var(--blue-400)', fontFamily:'var(--f-mono)', letterSpacing:'0.02em' }}>{g.expansao}</div>
                  <p style={{ fontSize:13, color:'var(--text-2)', lineHeight:1.5, margin:0 }}>{g.def}</p>
                </div>
              ))}
            </div>
          </section>
        ))}
        {filtered.length === 0 && (
          <div className="card" style={{ padding:48, textAlign:'center', color:'var(--text-3)' }}>
            <div className="serif" style={{ fontSize:28, marginBottom:8 }}>Nenhum termo encontrado.</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   SIMULADOR — recomenda instrumentos a partir de 4 perguntas
   ════════════════════════════════════════════════════════════ */
function Simulador() {
  const { INSTRUMENTOS, DOMINIOS } = window.ATLAS_DATA;

  const [tipo, setTipo] = React.useState('empresa-grande'); // empresa-mpe, empresa-grande, ict, startup
  const [regime, setRegime] = React.useState('lucro-real'); // lucro-real, lucro-presumido, simples, na
  const [dominios, setDominios] = React.useState([]);
  const [setor, setSetor] = React.useState('outro'); // outro, og, energia, automotivo, tic-semic
  const [maturidade, setMaturidade] = React.useState('trl4-6'); // trl1-3, trl4-6, trl7-9
  const [preferencia, setPreferencia] = React.useState([]); // não-reembolsável, crédito, fiscal, cofin

  const recomendacoes = React.useMemo(() => {
    const scores = {};
    INSTRUMENTOS.forEach(i => scores[i.id] = 0);

    // Tipo
    const t = tipo;
    const score = (id, n) => { scores[id] = (scores[id]||0) + n; };

    if (t === 'empresa-grande' || t === 'empresa-mpe') {
      score('finep-subvencao', 4); score('finep-mais-inovacao', 4);
      score('bndes-credito-inovacao', 3); score('embrapii', 4);
      if (regime === 'lucro-real') score('lei-do-bem', 6);
      score('cnpq-bolsas', 2); // RHAE
    }
    if (t === 'empresa-mpe' || t === 'startup') {
      score('faps', 4); score('sebrae-aliancas', 4);
      score('finep-subvencao', 3);
      score('embrapii', 3);
    }
    if (t === 'ict') {
      score('lei-inovacao', 6); score('bndes-funtec', 5);
      score('emendas-parlamentares', 4); score('cnpq-bolsas', 4);
      score('senai-isi', 3); score('aneel-pd', 3); score('anp-pdi', 3);
    }

    // Setor regulado
    if (setor === 'og') { score('anp-pdi', 8); score('embrapii', 3); }
    if (setor === 'energia') { score('aneel-pd', 7); score('finep-subvencao', 3); }
    if (setor === 'automotivo') { score('mover', 8); }
    if (setor === 'tic-semic') { score('lei-informatica', 7); score('padis', 6); }

    // Domínios
    dominios.forEach(d => {
      INSTRUMENTOS.forEach(i => { if (i.dominios.includes(d)) scores[i.id] += 1; });
    });

    // TRL
    if (maturidade === 'trl1-3') {
      score('cnpq-bolsas', 3); score('bndes-funtec', 2); score('faps', 2);
    }
    if (maturidade === 'trl4-6') {
      score('finep-subvencao', 3); score('embrapii', 4); score('senai-isi', 2);
    }
    if (maturidade === 'trl7-9') {
      score('bndes-credito-inovacao', 4); score('mover', 2); score('finep-mais-inovacao', 3);
    }

    // Preferência
    if (preferencia.includes('nao-reembolsavel')) {
      score('finep-subvencao', 3); score('bndes-funtec', 3); score('emendas-parlamentares', 2);
    }
    if (preferencia.includes('credito')) {
      score('bndes-credito-inovacao', 4); score('finep-mais-inovacao', 2);
    }
    if (preferencia.includes('fiscal')) {
      score('lei-do-bem', 5); score('lei-informatica', 3); score('padis', 3); score('mover', 3);
    }
    if (preferencia.includes('cofinanciamento')) {
      score('embrapii', 5); score('senai-isi', 3);
    }

    return Object.entries(scores)
      .filter(([_,s]) => s > 0)
      .map(([id, s]) => ({ instrumento: INSTRUMENTOS.find(i=>i.id===id), score: s }))
      .sort((a,b) => b.score - a.score)
      .slice(0, 6);
  }, [tipo, regime, dominios, setor, maturidade, preferencia]);

  const maxScore = Math.max(...recomendacoes.map(r=>r.score), 1);

  return (
    <div className="page fade-in">
      <SectionHead num="§ 07" kicker="Simulador" title="O que se aplica à minha organização?"
        lede="Responda quatro perguntas e veja os instrumentos potencialmente aderentes. Resultado heurístico — não substitui validação técnica e jurídica."
      />

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'var(--s-6)' }}>
        {/* Form */}
        <div className="card" style={{ padding:'24px 28px', display:'flex', flexDirection:'column', gap:'var(--s-5)' }}>
          <SimField num="01" title="Qual o tipo da organização?">
            <SegBig opts={[
              { id:'empresa-grande', label:'Empresa', sub:'média/grande' },
              { id:'empresa-mpe', label:'MPE', sub:'micro ou pequena' },
              { id:'startup', label:'Startup', sub:'base tecnológica' },
              { id:'ict', label:'ICT', sub:'universidade, centro' }
            ]} val={tipo} on={setTipo}/>
          </SimField>

          <SimField num="02" title="Regime tributário (se aplicável)">
            <SegBig opts={[
              { id:'lucro-real', label:'Lucro Real' },
              { id:'lucro-presumido', label:'Lucro Presumido' },
              { id:'simples', label:'Simples Nacional' },
              { id:'na', label:'Não se aplica' }
            ]} val={regime} on={setRegime}/>
          </SimField>

          <SimField num="03" title="Setor regulado?">
            <SegBig opts={[
              { id:'outro', label:'Outro' },
              { id:'og', label:'Petróleo & Gás' },
              { id:'energia', label:'Setor Elétrico' },
              { id:'automotivo', label:'Automotivo' },
              { id:'tic-semic', label:'TIC / Semicondutores' }
            ]} val={setor} on={setSetor}/>
          </SimField>

          <SimField num="04" title="Maturidade tecnológica (TRL)" hint="TRL 1-3 pesquisa básica · TRL 4-6 desenvolvimento · TRL 7-9 demonstração e produção">
            <SegBig opts={[
              { id:'trl1-3', label:'TRL 1-3' },
              { id:'trl4-6', label:'TRL 4-6' },
              { id:'trl7-9', label:'TRL 7-9' }
            ]} val={maturidade} on={setMaturidade}/>
          </SimField>

          <SimField num="05" title="Domínio(s) tecnológico(s) do projeto" hint="Selecione um ou mais para refinar.">
            <MultiToggle options={DOMINIOS} value={dominios} onChange={setDominios}/>
          </SimField>

          <SimField num="06" title="Preferências por mecanismo (opcional)">
            <MultiToggle
              options={[
                {id:'nao-reembolsavel',label:'Não-reembolsável'},
                {id:'credito',label:'Crédito'},
                {id:'fiscal',label:'Fiscal'},
                {id:'cofinanciamento',label:'Cofinanciamento'}
              ]}
              value={preferencia} onChange={setPreferencia}/>
          </SimField>
        </div>

        {/* Results */}
        <div>
          <div style={{ position:'sticky', top:80, display:'flex', flexDirection:'column', gap:14 }}>
            <div className="sec-num">Recomendações ordenadas</div>
            <h2 className="serif" style={{ fontSize:32, lineHeight:1.1, margin:0 }}>Top {recomendacoes.length} instrumentos para você explorar</h2>
            <p style={{ color:'var(--text-3)', fontSize:13, margin:0 }}>Score relativo. Quanto maior a barra, maior a aderência com as respostas.</p>

            <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:14 }}>
              {recomendacoes.map((r,k) => (
                <a key={r.instrumento.id} href={`#/instrumento/${r.instrumento.id}`} className="card" style={{
                  padding:'14px 16px',
                  display:'flex', flexDirection:'column', gap:10,
                  borderColor: k===0 ? 'var(--blue-500)' : ''
                }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                    <div style={{ display:'flex', alignItems:'baseline', gap:10 }}>
                      <span className="serif" style={{ fontSize:24, color: k===0 ? 'var(--blue-400)' : 'var(--text-2)' }}>{String(k+1).padStart(2,'0')}</span>
                      <div>
                        <div style={{ fontSize:14.5, fontWeight:600 }}>{r.instrumento.sigla}</div>
                        <div style={{ fontSize:11, color:'var(--text-3)' }}>{r.instrumento.categoria}</div>
                      </div>
                    </div>
                    <div className="mono" style={{ color:'var(--text-3)' }}>score {r.score}</div>
                  </div>
                  <div style={{ height:4, background:'var(--bg-2)', borderRadius:99, overflow:'hidden' }}>
                    <div style={{ height:'100%', width:`${(r.score/maxScore)*100}%`, background: k===0 ? 'var(--blue-500)' : 'var(--blue-900)', borderRadius:99 }}/>
                  </div>
                  <p style={{ fontSize:12.5, color:'var(--text-3)', lineHeight:1.5, margin:0 }}>{r.instrumento.resumo.slice(0,140)}…</p>
                </a>
              ))}
              {recomendacoes.length === 0 && (
                <div className="card" style={{ padding:24, color:'var(--text-3)', fontSize:13 }}>
                  Responda as perguntas ao lado para ver as recomendações.
                </div>
              )}
            </div>

          </div>
        </div>
      </div>
    </div>
  );
}

function SimField({ num, title, hint, children }) {
  return (
    <div>
      <div style={{ display:'flex', alignItems:'baseline', gap:10, marginBottom:10 }}>
        <span className="sec-num" style={{ color:'var(--blue-400)' }}>{num}</span>
        <h4 className="h4">{title}</h4>
      </div>
      {hint && <div style={{ fontSize:11.5, color:'var(--text-4)', marginBottom:10 }}>{hint}</div>}
      {children}
    </div>
  );
}

function SegBig({ opts, val, on }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:`repeat(${Math.min(opts.length, 4)}, 1fr)`, gap:6 }}>
      {opts.map(o => {
        const a = val === o.id;
        return (
          <button key={o.id} onClick={()=>on(o.id)} style={{
            padding:'10px 12px',
            border: `1px solid ${a ? 'var(--blue-500)' : 'var(--border-2)'}`,
            background: a ? 'var(--blue-glow)' : 'var(--bg-2)',
            color: a ? 'var(--blue-400)' : 'var(--text-2)',
            borderRadius: 8,
            display:'flex', flexDirection:'column', alignItems:'flex-start', gap:2,
            cursor:'pointer',
            transition:'.12s ease'
          }}>
            <span style={{ fontSize:13, fontWeight: a ? 600 : 500 }}>{o.label}</span>
            {o.sub && <span className="mono" style={{ color:'var(--text-4)', fontSize:9.5 }}>{o.sub}</span>}
          </button>
        );
      })}
    </div>
  );
}

function Pi() {
  const [secao, setSecao] = React.useState('o-que-e');
  const secoes = [
    { id:'o-que-e',     titulo:'O que é PI',           icon: I.flag },
    { id:'tipos',       titulo:'Tipos de PI',          icon: I.grid },
    { id:'como-funciona', titulo:'Como funciona',      icon: I.book },
    { id:'negociacao',  titulo:'Negociar com ICT',     icon: I.group },
    { id:'leis',        titulo:'Leis & regras',        icon: I.flag },
    { id:'valoracao',   titulo:'Valoração',            icon: I.money },
    { id:'erros',       titulo:'Erros comuns',         icon: I.warn },
    { id:'glossario',   titulo:'Glossário PI',         icon: I.abc }
  ];

  return (
    <div className="page fade-in">
      <SectionHead num="§ PI" kicker="Propriedade Intelectual" title="O que é, tipos e como negociar com ICT"
        lede="Guia executivo de Propriedade Intelectual para inovação no Brasil: tipos de proteção (patente, marca, software, cultivar, segredo), passo a passo de registro no INPI, negociação com ICTs sob a Lei de Inovação (cotitularidade, encomenda, licenciamento), valoração e erros que destroem valor."
      />

      <div style={{ display:'grid', gridTemplateColumns:'240px 1fr', gap:'var(--s-6)' }}>
        {/* Sidebar nav */}
        <aside style={{ position:'sticky', top:80, alignSelf:'flex-start', display:'flex', flexDirection:'column', gap:4 }}>
          {secoes.map(s => (
            <button key={s.id} onClick={()=>setSecao(s.id)} style={{
              display:'flex', alignItems:'center', gap:10,
              padding:'10px 12px',
              background: secao === s.id ? 'var(--bg-2)' : 'transparent',
              border:'1px solid', borderColor: secao === s.id ? 'var(--border-3)' : 'transparent',
              borderRadius:8, color: secao === s.id ? 'var(--text-1)' : 'var(--text-3)',
              fontSize:13, fontWeight: secao === s.id ? 600 : 500,
              textAlign:'left', cursor:'pointer', transition:'all .12s ease'
            }}>
              {React.createElement(s.icon)}
              {s.titulo}
            </button>
          ))}
        </aside>

        <article style={{ display:'flex', flexDirection:'column', gap:'var(--s-5)' }}>

          {secao === 'leis' && <PiLeis/>}
          {secao === 'valoracao' && <PiValoracao/>}
          {secao === 'erros' && <PiErros/>}
          {secao === 'glossario' && <PiGlossario/>}
        </article>
      </div>
    </div>
  );
}

/* Atlas da Inovação — App shell: router + Tweaks */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const { segment, param } = useRoute();
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks to document
  React.useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme === 'dark' ? '' : tweaks.theme;
    document.documentElement.dataset.density = tweaks.density;
  }, [tweaks]);

  let view;
  if (segment === '' || segment === 'home') view = <Hub/>;
  else if (segment === 'instrumentos') view = <Catalogo/>;
  else if (segment === 'instrumento') view = <InstrumentoDetalhe id={param}/>;
  else if (segment === 'radar') view = <Radar/>;
  else if (segment === 'mapa') view = <Mapa/>;
  else if (segment === 'guia') view = <Guia/>;
  else if (segment === 'simulador') view = <Simulador/>;
  else if (segment === 'glossario') view = <Glossario/>;
  else if (segment === 'pi')        view = <Pi/>;
  else view = <NotFound/>;

  return (
    <>
      <div className="atlas-backdrop"/>
      <Topbar segment={segment}/>
      <main key={segment + '/' + param}>{view}</main>
      <Footer/>
      <TweaksPanel title="Tweaks · Atlas">
        <TweakSection label="Aparência">
          <TweakRadio label="Tema" options={[
            { value:'dark', label:'Dashboard' },
            { value:'editorial', label:'Editorial' },
            { value:'atlas', label:'Atlas' }
          ]} value={tweaks.theme} onChange={v=>setTweak('theme', v)}/>
          <TweakRadio label="Densidade" options={[
            { value:'comfortable', label:'Confortável' },
            { value:'dense', label:'Compacta' }
          ]} value={tweaks.density} onChange={v=>setTweak('density', v)}/>
        </TweakSection>
        <TweakSection label="Atalhos">
          <TweakButton label="Ir para Hub" onClick={()=>navigate('#/')}/>
          <TweakButton label="Radar de Fomento" onClick={()=>navigate('#/radar')} secondary/>
          <TweakButton label="Mapa de ICTs" onClick={()=>navigate('#/mapa')} secondary/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

  return (
    <div className="page fade-in" style={{ minHeight:'70vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ textAlign:'center', maxWidth:480 }}>

        <p style={{ color:'var(--text-3)' }}>O endereço solicitado não foi mapeado. Volte ao Hub.</p>
        <a href="#/" className="btn primary" style={{ marginTop:20 }}>← Hub</a>
      </div>
    </div>
  );
}

function Footer() {
  return (
    <footer style={{ position:'relative', zIndex:1, borderTop:'1px solid var(--border-1)', padding:'24px 48px', marginTop:'var(--s-7)' }}>
      <div style={{ maxWidth:1480, margin:'0 auto', display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:14, fontSize:12, color:'var(--text-4)' }}>
        <div className="mono">Atlas da Inovação · v0.2 · Edição executiva 2026</div>
        <div className="mono" style={{ textAlign:'center' }}>
          Desenvolvido por{' '}
          <a href="https://www.linkedin.com/in/bruno-trasatti/" target="_blank" rel="noopener noreferrer"
             style={{ color:'var(--blue-400)', textDecoration:'none', borderBottom:'1px dashed var(--blue-400)' }}>

        </div>
      </div>
    </footer>
  );
}
