  <style>/* ─────────────────────────────────────────────────────────────────────
   Atlas da Inovação — Design Tokens & Base
   Paleta: deep navy + azul elétrico + verde tech
   ───────────────────────────────────────────────────────────────────── */

:root {
  /* Backgrounds */
  --bg-0: #060d1a;
  --bg-1: #0a1628;
  --bg-2: #0f1f3a;
  --bg-3: #14264a;
  --bg-card: #0d1c34;
  --bg-elev: #122443;

  /* Borders */
  --border-1: rgba(120, 160, 220, 0.10);
  --border-2: rgba(120, 160, 220, 0.18);
  --border-3: rgba(120, 160, 220, 0.30);

  /* Text */
  --text-1: #e8eef7;
  --text-2: #b8c5dc;
  --text-3: #8aa0bd;
  --text-4: #5a7090;
  --text-5: #3a4d6b;

  /* Accents */
  --blue-100: #dbeafe;
  --blue-400: #60a5fa;
  --blue-500: #3b82f6;
  --blue-600: #2563eb;
  --blue-900: #1e3a5f;
  --blue-glow: rgba(59, 130, 246, 0.18);

  --green-400: #34d399;
  --green-500: #10b981;
  --green-700: #047857;
  --green-glow: rgba(16, 185, 129, 0.18);

  --amber-500: #f59e0b;
  --amber-glow: rgba(245, 158, 11, 0.18);
  --rose-500: #f43f5e;
  --rose-glow: rgba(244, 63, 94, 0.18);

  /* Spacing scale (8pt) */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;
  --s-9: 96px;

  /* Radii */
  --r-1: 4px;
  --r-2: 6px;
  --r-3: 10px;
  --r-4: 14px;
  --r-5: 20px;

  /* Typography */
  --f-display: 'Instrument Serif', 'Iowan Old Style', 'Georgia', serif;
  --f-body: 'Geist', 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
  --f-mono: 'JetBrains Mono', 'IBM Plex Mono', 'Menlo', monospace;

  /* Shadows */
  --shadow-1: 0 1px 0 rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.4);
  --shadow-2: 0 6px 24px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.5);
  --shadow-3: 0 24px 48px rgba(0,0,0,0.45), 0 8px 16px rgba(0,0,0,0.35);
  --inner-1: inset 0 1px 0 rgba(255,255,255,0.04);
}

/* ── Editorial light variant ───────────────────────────────────────── */
[data-theme="editorial"] {
  --bg-0: #f7f4ec;
  --bg-1: #efeae0;
  --bg-2: #ebe5d6;
  --bg-3: #e5dec8;
  --bg-card: #fefcf7;
  --bg-elev: #fffefa;
  --border-1: rgba(40, 35, 25, 0.10);
  --border-2: rgba(40, 35, 25, 0.18);
  --border-3: rgba(40, 35, 25, 0.30);
  --text-1: #1a1612;
  --text-2: #3a322a;
  --text-3: #6b5e4f;
  --text-4: #8a7d6c;
  --text-5: #b0a48f;
  --blue-500: #1d4ed8;
  --green-500: #0f766e;
  --amber-500: #b45309;
}

/* ── Cartographic warm variant ─────────────────────────────────────── */
[data-theme="atlas"] {
  --bg-0: #1a120a;
  --bg-1: #221710;
  --bg-2: #2c1f15;
  --bg-3: #382818;
  --bg-card: #251a11;
  --bg-elev: #2f2117;
  --border-1: rgba(220, 180, 120, 0.12);
  --border-2: rgba(220, 180, 120, 0.20);
  --border-3: rgba(220, 180, 120, 0.34);
  --text-1: #f4ead7;
  --text-2: #d4c5a3;
  --text-3: #a08c66;
  --text-4: #75644a;
  --blue-500: #c2410c;
  --green-500: #84cc16;
  --amber-500: #facc15;
}

/* ── Reset & base ──────────────────────────────────────────────────── */
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  font-family: var(--f-body);
  background: var(--bg-0);
  color: var(--text-1);
  font-feature-settings: "ss01", "cv11";
  font-size: 15px;
  line-height: 1.5;
  letter-spacing: -0.005em;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body { min-height: 100vh; overflow-x: hidden; }
#app { min-height: 100vh; }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
::selection { background: var(--blue-glow); color: var(--text-1); }

.serif { font-family: var(--f-display); font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: var(--f-mono); font-size: 0.78em; letter-spacing: 0.04em; text-transform: uppercase; }
.mono-lc { font-family: var(--f-mono); font-size: 0.85em; letter-spacing: 0.01em; }
.muted { color: var(--text-3); }
.dim { color: var(--text-4); }

/* ── Atlas backdrop — subtle grid + glow ───────────────────────────── */
.atlas-backdrop {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(900px 600px at 12% 8%, rgba(59,130,246,0.10), transparent 60%),
    radial-gradient(700px 500px at 92% 18%, rgba(16,185,129,0.07), transparent 60%),
    radial-gradient(600px 400px at 50% 110%, rgba(59,130,246,0.06), transparent 60%);
}
.atlas-backdrop::before {
  content: ""; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(120,160,220,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,160,220,0.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

/* ── Scrollbar ─────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-3); }

/* ── Reusable components ───────────────────────────────────────────── */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px;
  border: 1px solid var(--border-2);
  border-radius: 99px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-2);
  background: rgba(255,255,255,0.02);
  white-space: nowrap;
}
.chip.solid { background: var(--blue-glow); border-color: var(--blue-500); color: var(--blue-400); }
.chip.green { background: var(--green-glow); border-color: var(--green-500); color: var(--green-400); }
.chip.amber { background: var(--amber-glow); border-color: var(--amber-500); color: var(--amber-500); }
.chip.rose  { background: var(--rose-glow);  border-color: var(--rose-500);  color: var(--rose-500); }
.chip .dot { width: 6px; height: 6px; border-radius: 99px; background: currentColor; box-shadow: 0 0 0 3px rgba(255,255,255,0.04); }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border: 1px solid var(--border-2);
  background: var(--bg-2);
  color: var(--text-1);
  border-radius: var(--r-2);
  font-size: 13px;
  font-weight: 500;
  transition: all .15s ease;
}
.btn:hover { border-color: var(--border-3); background: var(--bg-3); }
.btn.primary { background: var(--blue-500); border-color: var(--blue-500); color: white; }
.btn.primary:hover { background: var(--blue-600); border-color: var(--blue-600); }
.btn.ghost { background: transparent; }
.btn.sm { padding: 5px 10px; font-size: 12px; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border-1);
  border-radius: var(--r-4);
  box-shadow: var(--shadow-1), var(--inner-1);
}

.divider { height: 1px; background: var(--border-1); margin: var(--s-5) 0; }

/* Section number — editorial accent */
.sec-num {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--text-4);
  text-transform: uppercase;
}

/* ── Layout primitives ─────────────────────────────────────────────── */
.page {
  position: relative;
  z-index: 1;
  max-width: 1480px;
  margin: 0 auto;
  padding: var(--s-6) var(--s-7) var(--s-8);
}
@media (max-width: 900px) { .page { padding: var(--s-5) var(--s-4); } }

.h1 { font-family: var(--f-display); font-size: clamp(40px, 5vw, 72px); line-height: 1; margin: 0; letter-spacing: -0.02em; font-weight: 400; }
.h2 { font-family: var(--f-display); font-size: clamp(28px, 3vw, 44px); line-height: 1.05; margin: 0; letter-spacing: -0.01em; font-weight: 400; }
.h3 { font-size: 18px; font-weight: 600; line-height: 1.3; margin: 0; letter-spacing: -0.005em; }
.h4 { font-size: 14px; font-weight: 600; line-height: 1.3; margin: 0; }

/* ── Top bar ───────────────────────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: color-mix(in oklab, var(--bg-0) 88%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-1);
}
.topbar-inner {
  max-width: 1480px; margin: 0 auto;
  display: flex; align-items: center; gap: var(--s-5);
  padding: 14px var(--s-7);
}
@media (max-width: 900px) { .topbar-inner { padding: 12px var(--s-4); } }
.brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.brand-mark {
  width: 36px; height: 36px;
  display: grid; place-items: center;
  filter: drop-shadow(0 0 10px var(--blue-glow));
}
.brand-mark svg { width: 100%; height: 100%; display: block; }
.brand-name { font-family: var(--f-display); font-size: 19px; letter-spacing: -0.01em; white-space: nowrap; }
.brand-sub { font-family: var(--f-mono); font-size: 9.5px; letter-spacing: 0.12em; color: var(--text-3); text-transform: uppercase; }

.nav-tabs { display: flex; gap: 2px; margin-left: 12px; flex: 1; overflow-x: auto; scrollbar-width: none; }
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-tab {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  white-space: nowrap;
  padding: 7px 12px;
  border-radius: var(--r-2);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  border: 1px solid transparent;
  background: transparent;
  transition: all .15s ease;
}
.nav-tab:hover { color: var(--text-1); background: var(--bg-2); }
.nav-tab.active { color: var(--text-1); background: var(--bg-2); border-color: var(--border-2); }
@media (max-width: 1100px) { .nav-tabs { display: none; } }

.topbar-meta { display: flex; align-items: center; gap: 12px; color: var(--text-3); font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
.live-dot { width: 6px; height: 6px; background: var(--green-500); border-radius: 99px; box-shadow: 0 0 0 4px var(--green-glow); animation: pulse 2.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.4; } }

/* ── Section header ────────────────────────────────────────────────── */
.section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: var(--s-5);
  margin-bottom: var(--s-6);
  padding-bottom: var(--s-5);
  border-bottom: 1px solid var(--border-1);
}
.section-head .title { display: flex; flex-direction: column; gap: 6px; }
.section-head .lede { color: var(--text-3); max-width: 60ch; }

/* ── Animations ───────────────────────────────────────────────────── */
.fade-in { animation: fade-in .4s ease both; }
@keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.slide-up { animation: slide-up .35s cubic-bezier(.22,.61,.36,1) both; }
@keyframes slide-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

/* Density */
[data-density="dense"] {
  font-size: 13.5px;
}
[data-density="dense"] .card { border-radius: var(--r-3); }
[data-density="dense"] .page { padding-top: var(--s-5); }

/* Print friendliness */
@media print {
  .topbar, .tweaks-panel, .nav-tabs { display: none !important; }
  .atlas-backdrop { display: none; }
  body { background: white; color: black; }
}

/* Floating Tweaks trigger (added for stand-alone bundle) */
#atlas-tweaks-trigger {
  position: fixed; right: 18px; bottom: 18px; z-index: 2147483645;
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--bg-elev); color: var(--text-1);
  border: 1px solid var(--border-3);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.4);
  display: grid; place-items: center;
  font-size: 18px; cursor: pointer;
  transition: transform .12s ease, background .12s ease;
}
#atlas-tweaks-trigger:hover { background: var(--bg-3); transform: translateY(-1px); }
#atlas-tweaks-trigger:active { transform: translateY(0); }
@media print { #atlas-tweaks-trigger { display: none; } }
  </style>
</head>

  { termo: 'TT', expansao: 'Transferência de Tecnologia', def: 'Processo formal de passagem de conhecimento, PI ou know-how da ICT/empresa geradora para o ente que vai explorar comercialmente, via licença, cessão ou contrato de prestação.' },

  { termo: 'CRL', expansao: 'Commercial Readiness Level', def: 'Escala de 1 a 9 que mede a prontidão comercial da tecnologia: validação de mercado, modelo de negócio, canais, regulação e financiabilidade.' },

  { termo: 'Royalty', expansao: 'Royalty', def: 'Pagamento periódico pelo direito de explorar uma tecnologia, marca ou ativo de PI licenciado, geralmente percentual sobre receita líquida ou unidade vendida.' },
  { termo: 'Licenciamento', expansao: 'Licenciamento de tecnologia', def: 'Contrato que autoriza terceiro a usar PI sem transferência de titularidade, podendo ser exclusivo, não exclusivo, com ou sem sublicenciamento.' },

<script type="text/babel" data-presets="react">
// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",
//     "palette": ["#D97757", "#29261b", "#f6f4ef"],
//     "fontSize": 16,
//     "density": "regular",
//     "dark": false
//   }/*EDITMODE-END*/;
//
//   function App() {
//     const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
//     return (
//       <div style={{ fontSize: t.fontSize, color: t.primaryColor }}>
//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        options={['#D97757', '#2A6FDB', '#1F8A5B', '#7A5AE0']}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakColor  label="Palette" value={t.palette}
//                        options={[['#D97757', '#29261b', '#f6f4ef'],
//                                  ['#475569', '#0f172a', '#f1f5f9']]}
//                        onChange={(v) => setTweak('palette', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}

  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}

  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;
    overflow-wrap:anywhere}

  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}

  .twk-num{display:flex;align-items:center;box-sizing:border-box;min-width:0;height:26px;padding:0 0 0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6)}
  .twk-num-lbl{font-weight:500;color:rgba(41,38,27,.6);cursor:ew-resize;
    user-select:none;padding-right:8px}
  .twk-num input{flex:1;min-width:0;height:100%;border:0;background:transparent;
    font:inherit;font-variant-numeric:tabular-nums;text-align:right;padding:0 8px 0 0;
    outline:none;color:inherit;-moz-appearance:textfield}
  .twk-num input::-webkit-inner-spin-button,.twk-num input::-webkit-outer-spin-button{
    -webkit-appearance:none;margin:0}
  .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}

  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}

}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,

  TweakText, TweakNumber, TweakColor, TweakButton,

/* ────────────────────────────────────────────────────────────────────
   Hash router — simple, no deps
   #/instrumentos, #/instrumento/lei-do-bem, #/radar, etc.
   ──────────────────────────────────────────────────────────────────── */
function useRoute() {
  const [route, setRoute] = useState(window.location.hash || '#/');
  useEffect(() => {
    const onHash = () => setRoute(window.location.hash || '#/');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const parts = route.replace(/^#\/?/, '').split('/').filter(Boolean);
  const path = '/' + parts.join('/');
  return { path, parts, segment: parts[0] || '', param: parts[1] || '' };
}
function navigate(href) {
  if (!href.startsWith('#')) href = '#' + (href.startsWith('/') ? href : '/' + href);
  window.location.hash = href.slice(1);
  window.scrollTo({ top: 0, behavior: 'instant' });
}

/* ────────────────────────────────────────────────────────────────────
   Helpers — formatters
   ──────────────────────────────────────────────────────────────────── */
function daysBetween(a, b) {
  const da = new Date(a), db = new Date(b);
  return Math.round((db - da) / 86400000);
}
function formatDateBR(s) {
  if (!s) return '';
  const d = new Date(s);
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtMoney(n) {
  if (n == null) return '';
  if (n >= 1000) return `R$ ${(n/1000).toFixed(1).replace('.', ',')} bi`;
  return `R$ ${n.toLocaleString('pt-BR')} mi`;
}

function DomainsBar({ chamadas }) {
  const { DOMINIOS } = window.ATLAS_DATA;
  // aggregate volume per domain (split equally between domains of a call)
  const map = {};
  chamadas.forEach(c => {
    const share = (c.valorTotal || 0) / c.dominios.length;
    c.dominios.forEach(d => { map[d] = (map[d] || 0) + share; });
  });
  const rows = DOMINIOS.map(d => ({ ...d, total: map[d.id] || 0 })).sort((a,b)=>b.total-a.total);
  const max = Math.max(...rows.map(r=>r.total), 1);

  return (
    <div className="card" style={{ padding:'20px 22px' }}>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {rows.slice(0,9).map(r => (
          <div key={r.id} style={{ display:'grid', gridTemplateColumns:'140px 1fr 80px', alignItems:'center', gap:12 }}>
            <DomainDot id={r.id} label={true}/>
            <div style={{ height:8, background:'var(--bg-2)', borderRadius:99, overflow:'hidden', position:'relative' }}>
              <div style={{ height:'100%', width:`${(r.total/max)*100}%`, background:r.cor, borderRadius:99, transition:'width .6s ease' }}/>
            </div>
            <div className="mono" style={{ color: r.total > 0 ? 'var(--text-2)' : 'var(--text-5)', textAlign:'right', fontSize:11 }}>
              {r.total > 0 ? fmtMoney(Math.round(r.total)) : '—'}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function RegionStrip({ ictByRegion, abertas }) {
  const regions = ['Norte','Nordeste','Centro-Oeste','Sudeste','Sul'];
  const chamadasByRegion = {};
  abertas.forEach(c => {
    if (c.regiao && c.regiao !== 'Nacional') {
      chamadasByRegion[c.regiao] = (chamadasByRegion[c.regiao] || 0) + 1;
    }
  });
  const max = Math.max(...regions.map(r => ictByRegion[r] || 0));
  return (
    <div className="card" style={{ padding:'20px 22px', display:'flex', flexDirection:'column', gap:14 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span className="mono" style={{ color:'var(--text-3)' }}>ICTs por região</span>
        <a href="#/mapa" style={{ fontSize:11, color:'var(--blue-400)', display:'flex', alignItems:'center', gap:4 }} className="mono">Mapa <I.arrow/></a>
      </div>
      {regions.map(r => {
        const n = ictByRegion[r] || 0;
        const chamadas = chamadasByRegion[r] || 0;
        return (
          <div key={r} style={{ display:'flex', alignItems:'center', gap:10 }}>
            <div style={{ width:90, fontSize:12, color:'var(--text-2)' }}>{r}</div>
            <div style={{ flex:1, display:'flex', alignItems:'center', gap:2 }}>
              {[...Array(n)].map((_,i)=>(
                <div key={i} style={{ width:8, height:18, background:`linear-gradient(180deg, var(--blue-500), var(--blue-600))`, borderRadius:2, opacity: 0.4 + 0.6*(i/Math.max(n-1,1)) }}/>
              ))}
              {[...Array(Math.max(0, max-n))].map((_,i)=>(
                <div key={`e${i}`} style={{ width:8, height:18, background:'var(--bg-2)', borderRadius:2 }}/>
              ))}
            </div>
            <div className="mono" style={{ minWidth:32, color:'var(--text-2)', textAlign:'right' }}>{n}</div>
            <div className="mono" style={{ minWidth:48, color: chamadas ? 'var(--green-400)' : 'var(--text-5)', textAlign:'right', fontSize:10 }}>
              {chamadas ? `${chamadas} ch.` : '—'}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* Atlas da Inovação — Catálogo de Instrumentos + página de detalhe */

function Catalogo() {
  const { INSTRUMENTOS, DOMINIOS, AGENCIAS } = window.ATLAS_DATA;
  const [q, setQ] = React.useState('');
  const [dominio, setDominio] = React.useState([]);
  const [agencia, setAgencia] = React.useState([]);
  const [categoria, setCategoria] = React.useState([]);
  const [compareIds, setCompareIds] = React.useState([]);
  const [showCompare, setShowCompare] = React.useState(false);

  const categorias = React.useMemo(() => Array.from(new Set(INSTRUMENTOS.map(i => i.categoria))).map(c => ({ id: c, label: c })), [INSTRUMENTOS]);

  const filtered = React.useMemo(() => {
    return INSTRUMENTOS.filter(i => {
      if (q && !`${i.sigla} ${i.nome} ${i.resumo} ${i.tags?.join(' ')}`.toLowerCase().includes(q.toLowerCase())) return false;
      if (dominio.length && !i.dominios.some(d => dominio.includes(d))) return false;
      if (agencia.length && !agencia.includes(i.agencia)) return false;
      if (categoria.length && !categoria.includes(i.categoria)) return false;
      return true;
    });
  }, [q, dominio, agencia, categoria]);

  const toggleCompare = (id) => {
    setCompareIds(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 3) return [prev[1], prev[2], id];
      return [...prev, id];
    });
  };

  const reset = () => { setQ(''); setDominio([]); setAgencia([]); setCategoria([]); };

  return (
    <div className="page fade-in">
      <SectionHead num="§ 02" kicker="Catálogo" title="Instrumentos de inovação"
        lede="Leis, programas, incentivos fiscais e mecanismos de fomento mapeados por domínio tecnológico, agência e modalidade. Selecione até três para comparar lado a lado."
        right={compareIds.length >= 2 && <button onClick={()=>setShowCompare(true)} className="btn primary"><I.spark/> Comparar {compareIds.length}</button>}
      />

      <div style={{ display:'grid', gridTemplateColumns:'280px 1fr', gap:'var(--s-6)' }}>
        {/* Filters */}
        <aside style={{ display:'flex', flexDirection:'column', gap:18, position:'sticky', top:80, alignSelf:'flex-start' }}>
          <SearchInput value={q} onChange={setQ} placeholder="Buscar por sigla, tag, descrição…"/>
          <FilterBlock label="Domínio tecnológico" count={dominio.length}>
            <MultiToggle options={DOMINIOS} value={dominio} onChange={setDominio} />
          </FilterBlock>
          <FilterBlock label="Agência / Origem" count={agencia.length}>
            <MultiToggle options={AGENCIAS.map(a=>({ id:a.id, label:a.nome }))} value={agencia} onChange={setAgencia} />
          </FilterBlock>
          <FilterBlock label="Modalidade" count={categoria.length}>
            <MultiToggle options={categorias} value={categoria} onChange={setCategoria} />
          </FilterBlock>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', paddingTop:8, borderTop:'1px solid var(--border-1)' }}>
            <span className="mono" style={{ color:'var(--text-3)' }}>{filtered.length} de {INSTRUMENTOS.length}</span>
            <button className="btn sm ghost" onClick={reset}>Limpar</button>
          </div>
        </aside>

        {/* Grid */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))', gap:14, alignContent:'flex-start' }}>
          {filtered.map(i => <InstrumentCard key={i.id} i={i} selected={compareIds.includes(i.id)} onCompare={()=>toggleCompare(i.id)}/>)}
          {filtered.length === 0 && (
            <div className="card" style={{ padding:'40px 28px', textAlign:'center', color:'var(--text-3)' }}>
              <div className="serif" style={{ fontSize:28, marginBottom:8 }}>Nenhum instrumento bate com esses filtros.</div>
              <div style={{ fontSize:13 }}>Tente afrouxar os critérios ou <button onClick={reset} style={{ background:'none',border:0,color:'var(--blue-400)',textDecoration:'underline',cursor:'pointer' }}>limpar filtros</button>.</div>
            </div>
          )}
        </div>
      </div>

      {showCompare && <CompareDrawer ids={compareIds} onClose={()=>setShowCompare(false)} onRemove={toggleCompare}/>}
    </div>
  );
}
